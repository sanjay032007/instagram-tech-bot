name: Publish Tech News Post

on:
  workflow_dispatch:
  issues:
    types: [opened]

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Premium Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-roboto
        
    - name: Run Automation Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
      run: python main.py

    - name: Commit Image History
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add used_images.txt || true
        git commit -m "Update image history [skip ci]" || true
        git push

    - name: Close Issue (if triggered by Slack/Issue)
      if: github.event_name == 'issues'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh issue close ${{ github.event.issue.number }} -c "Post successfully generated and published to Instagram!"
